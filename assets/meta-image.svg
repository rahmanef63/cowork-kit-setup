      <stop offset="0.55" stop-color="#A78BFA"/>
      <stop offset="1" stop-color="#F0ABFC"/>
    </linearGradient>
    <filter id="softShadow" x="-40" y="-40" width="1280" height="710" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
