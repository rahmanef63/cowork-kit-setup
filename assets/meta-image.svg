    <text x="120" y="329" class="body" font-size="24" font-weight="500">Turn any field into a ready automation kit.</text>
    <text x="120" y="365" class="muted" font-size="20" font-weight="450">Claude interviews, scaffolds, runs, and fixes the workflow.</text>

    <g transform="translate(116 418)">
