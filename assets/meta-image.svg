    <circle cx="109" cy="510" r="2" fill="#E0F2FE"/>
    <circle cx="231" cy="98" r="2" fill="#E0F2FE"/>
    <circle cx="953" cy="110" r="2" fill="#F5D0FE"/>
    <circle cx="1079" cy="445" r="2" fill="#F5D0FE"/>
