      .mono { font-family: "SF Mono", "Cascadia Mono", "Roboto Mono", Consolas, monospace; }
      .muted { fill: #9EA8C4; }
      .body { fill: #C9D2EA; }
      .white { fill: #F8FAFC; }
      .dim { fill: #727D9E; }
    </style>
