<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Cowork Automation Generator social preview</title>
  <desc id="desc">Meta image for cowork-kit-setup showing a field name becoming a ready automation kit.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#070B16"/>
      <stop offset="0.46" stop-color="#0D1730"/>
      <stop offset="1" stop-color="#121127"/>
    </linearGradient>
    <radialGradient id="orbA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(260 70) rotate(42) scale(440 250)">
      <stop stop-color="#6EE7F9" stop-opacity="0.44"/>
      <stop offset="1" stop-color="#6EE7F9" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orbB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1000 500) rotate(132) scale(380 270)">
      <stop stop-color="#A78BFA" stop-opacity="0.40"/>
      <stop offset="1" stop-color="#A78BFA" stop-opacity="0"/>
