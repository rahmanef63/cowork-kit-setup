      <rect x="0" y="0" width="344" height="384" rx="30" fill="rgba(10,17,32,0.72)" stroke="rgba(255,255,255,0.15)"/>
      <rect x="22" y="22" width="300" height="64" rx="18" fill="rgba(103,232,249,0.10)" stroke="rgba(103,232,249,0.25)"/>
      <circle cx="54" cy="54" r="10" fill="#67E8F9"/>
      <text x="78" y="50" class="white" font-size="21" font-weight="760">User talks</text>
      <text x="78" y="72" class="muted" font-size="14" font-weight="520">“I run a clinic”</text>

      <path d="M172 96 V126" stroke="#64748B" stroke-width="2" stroke-linecap="round"/>
      <path d="M164 119 L172 127 L180 119" stroke="#64748B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

      <rect x="22" y="132" width="300" height="82" rx="20" fill="rgba(167,139,250,0.11)" stroke="rgba(167,139,250,0.28)"/>
      <circle cx="54" cy="173" r="10" fill="#A78BFA"/>
      <text x="78" y="165" class="white" font-size="21" font-weight="760">Claude designs</text>
      <text x="78" y="189" class="muted" font-size="14" font-weight="520">Interview, scaffold, fix</text>

      <path d="M172 224 V254" stroke="#64748B" stroke-width="2" stroke-linecap="round"/>
      <path d="M164 247 L172 255 L180 247" stroke="#64748B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

      <rect x="22" y="260" width="300" height="90" rx="20" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.16)"/>
      <text x="46" y="294" class="white mono" font-size="19" font-weight="700">projects/&lt;field&gt;/</text>
      <g transform="translate(46 312)">
        <rect x="0" y="0" width="56" height="22" rx="11" fill="rgba(103,232,249,0.13)"/>
        <text x="14" y="16" fill="#BAF8FF" font-size="11" font-weight="800">skill</text>
        <rect x="68" y="0" width="44" height="22" rx="11" fill="rgba(167,139,250,0.13)"/>
        <text x="83" y="16" fill="#DDD6FE" font-size="11" font-weight="800">CLI</text>
        <rect x="124" y="0" width="70" height="22" rx="11" fill="rgba(240,171,252,0.13)"/>
        <text x="143" y="16" fill="#F5D0FE" font-size="11" font-weight="800">wizard</text>
      </g>
    </g>
