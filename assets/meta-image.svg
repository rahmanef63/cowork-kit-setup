        <text x="214" y="30" class="body" font-size="17" font-weight="650">Human approval</text>
      </g>
      <g filter="url(#smallShadow)">
        <rect x="424" y="0" width="183" height="46" rx="23" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.16)"/>
        <text x="446" y="30" class="body" font-size="17" font-weight="650">BYOK webapp</text>
