<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">cowork-kit-setup — turn your field into a working AI automation kit</title>
  <desc id="desc">Social preview: Claude interviews you about your field, then designs, generates, and runs a complete automation kit under projects/&lt;field&gt;/ — usable as a CLI, wizard, or web app.</desc>

  <defs>
    <style>
      .h  { font-family: 'Trebuchet MS', 'Verdana', 'DejaVu Sans', sans-serif; }
      .t  { font-family: 'DejaVu Sans', 'Liberation Sans', sans-serif; }
      .m  { font-family: 'DejaVu Sans Mono', 'Liberation Mono', monospace; }
      .ink   { fill: #2A2622; }
      .soft  { fill: #5C5346; }
      .mut   { fill: #7A7163; }
      .orange{ fill: #C25A2E; }
    </style>
    <radialGradient id="warm" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(150 70) rotate(38) scale(620 420)">
      <stop stop-color="#FFFBF2" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#FFFBF2" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#5A4A2E" flood-opacity="0.10"/>
    </filter>
  </defs>

  <!-- background -->
  <rect width="1200" height="630" fill="#F6F1E6"/>
  <rect width="1200" height="630" fill="url(#warm)"/>
  <rect x="6" y="6" width="1188" height="618" rx="26" fill="none" stroke="#E7E0D0" stroke-width="2"/>

  <!-- ===================== LEFT COLUMN ===================== -->

  <!-- badge -->
  <g>
    <rect x="56" y="44" width="262" height="44" rx="14" fill="#F4E4D7" stroke="#C25A2E" stroke-width="2.4"/>
    <text x="76" y="73" class="m orange" font-size="22" font-weight="700">cowork-kit-setup</text>
  </g>

  <!-- headline -->
  <g class="h" font-weight="800" letter-spacing="-1">
    <text x="55" y="150" class="ink" font-size="44">Turn your field</text>
    <text x="55" y="200" font-size="44"><tspan class="ink">into a </tspan><tspan class="orange">working</tspan></text>
    <text x="55" y="250" class="orange" font-size="44">AI automation kit.</text>
  </g>

  <!-- body -->
  <g class="t soft" font-size="18" font-weight="500">
    <text x="56" y="286">Claude helps you design, generate, and</text>
    <text x="56" y="312">run a complete workspace that actually</text>
    <text x="56" y="338">gets things done.</text>
    <line x1="56" y1="346" x2="183" y2="346" stroke="#C25A2E" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- checklist -->
  <g class="t" font-size="16.5" font-weight="600">
    <!-- row 1 -->
    <circle cx="67" cy="372" r="11" fill="#E2F0E7" stroke="#4E9A6C" stroke-width="2"/>
    <path d="M62 372 l3.4 3.6 l6.4 -7.4" fill="none" stroke="#4E9A6C" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="90" y="378" class="ink">Interview &amp; understand your field</text>
    <!-- row 2 -->
    <circle cx="67" cy="402" r="11" fill="#E2F0E7" stroke="#4E9A6C" stroke-width="2"/>
    <path d="M62 402 l3.4 3.6 l6.4 -7.4" fill="none" stroke="#4E9A6C" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="90" y="408" class="ink">Generate <tspan class="m" font-size="15.5">projects/&lt;field&gt;/</tspan> kit</text>
    <!-- row 3 -->
    <circle cx="67" cy="432" r="11" fill="#E2F0E7" stroke="#4E9A6C" stroke-width="2"/>
    <path d="M62 432 l3.4 3.6 l6.4 -7.4" fill="none" stroke="#4E9A6C" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="90" y="438" class="ink">Skills, tools, workflows, prompts</text>
    <!-- row 4 -->
    <circle cx="67" cy="462" r="11" fill="#E2F0E7" stroke="#4E9A6C" stroke-width="2"/>
    <path d="M62 462 l3.4 3.6 l6.4 -7.4" fill="none" stroke="#4E9A6C" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="90" y="468" class="ink">CLI, Wizard, or Web App — your choice</text>
    <!-- row 5 -->
    <circle cx="67" cy="492" r="11" fill="#E2F0E7" stroke="#4E9A6C" stroke-width="2"/>
    <path d="M62 492 l3.4 3.6 l6.4 -7.4" fill="none" stroke="#4E9A6C" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="90" y="498" class="ink">Ready to run. Easy to extend.</text>
  </g>

  <!-- purple callout -->
  <g filter="url(#soft)">
    <rect x="56" y="512" width="404" height="60" rx="14" fill="#E7E3F6" stroke="#C3BBE8" stroke-width="2"/>
  </g>
  <path d="M84 542 l4 -11 l4 11 l11 4 l-11 4 l-4 11 l-4 -11 l-11 -4 z" fill="#6D5FA6"/>
  <g class="t" font-weight="600" fill="#3D3559">
    <text x="112" y="538" font-size="15">Focus on your work.</text>
    <text x="112" y="559" font-size="15">Let Claude handle the setup.</text>
  </g>

  <!-- column divider -->
  <line x1="490" y1="60" x2="490" y2="540" stroke="#E4DDCD" stroke-width="2" stroke-dasharray="2 8" stroke-linecap="round"/>

  <!-- ===================== RIGHT: 4 STEPS ===================== -->
  <g class="t">
    <!-- step 1: person + question -->
    <g stroke="#2A2622" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="566" cy="68" r="9"/>
      <path d="M550 92 a18 18 0 0 1 32 0"/>
      <rect x="586" y="48" width="26" height="20" rx="7" fill="#FFFFFF"/>
      <path d="M594 68 l-4 7 l9 -5"/>
    </g>
    <text x="599" y="63" class="ink h" font-size="13" font-weight="800" text-anchor="middle">?</text>
    <text x="580" y="124" class="soft" font-size="12.5" font-weight="700" text-anchor="middle">1. You tell Claude</text>
    <text x="580" y="140" class="mut" font-size="12.5" text-anchor="middle">about your field</text>

    <!-- step 2: chat bubble -->
    <g stroke="#2A2622" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <rect x="716" y="54" width="50" height="32" rx="11" fill="#FFFFFF"/>
      <path d="M728 86 l-2 9 l11 -9"/>
    </g>
    <g fill="#2A2622" stroke="none">
      <circle cx="730" cy="70" r="2.2"/><circle cx="741" cy="70" r="2.2"/><circle cx="752" cy="70" r="2.2"/>
    </g>
    <text x="740" y="124" class="soft" font-size="12.5" font-weight="700" text-anchor="middle">2. Claude asks</text>
    <text x="740" y="140" class="mut" font-size="12.5" text-anchor="middle">questions &amp; understands</text>

    <!-- step 3: folder + sparkle -->
    <g stroke="#2A2622" stroke-width="2.2" stroke-linejoin="round">
      <path d="M880 60 h12 l4 5 h16 a3 3 0 0 1 3 3 v20 a3 3 0 0 1 -3 3 h-32 a3 3 0 0 1 -3 -3 v-22 a3 3 0 0 1 3 -3 z" fill="#ECD7AE"/>
    </g>
    <path d="M922 50 l3 -8 l3 8 l8 3 l-8 3 l-3 8 l-3 -8 l-8 -3 z" fill="#C25A2E"/>
    <text x="900" y="124" class="soft" font-size="12.5" font-weight="700" text-anchor="middle">3. Claude generates</text>
    <text x="900" y="140" class="mut" font-size="12.5" text-anchor="middle">your automation kit</text>

    <!-- step 4: browser + check -->
    <g stroke="#2A2622" stroke-width="2.2" fill="none" stroke-linejoin="round" stroke-linecap="round">
      <rect x="1034" y="52" width="52" height="40" rx="6" fill="#FFFFFF"/>
      <path d="M1034 64 h52"/>
    </g>
    <g fill="#2A2622" stroke="none"><circle cx="1041" cy="58" r="1.7"/><circle cx="1047" cy="58" r="1.7"/><circle cx="1053" cy="58" r="1.7"/></g>
    <circle cx="1060" cy="79" r="9" fill="#E2F0E7" stroke="#4E9A6C" stroke-width="2.2"/>
    <path d="M1055 79 l3.2 3.4 l6 -7" fill="none" stroke="#4E9A6C" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="1060" y="124" class="soft" font-size="12.5" font-weight="700" text-anchor="middle">4. You run it</text>
    <text x="1060" y="140" class="mut" font-size="12.5" text-anchor="middle">wherever you work</text>

    <!-- arrows between steps -->
    <g stroke="#9A917F" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M624 76 h74 m-9 -6 l9 6 l-9 6"/>
      <path d="M788 76 h74 m-9 -6 l9 6 l-9 6"/>
      <path d="M948 76 h74 m-9 -6 l9 6 l-9 6"/>
    </g>
  </g>

  <!-- ===================== RIGHT: PROJECT PANEL ===================== -->
  <g filter="url(#soft)">
    <rect x="500" y="162" width="660" height="312" rx="20" fill="#FCFAF3" stroke="#D9D2C4" stroke-width="2"/>
  </g>

  <text x="524" y="200" class="m" font-size="22" font-weight="700"><tspan class="ink">projects/</tspan><tspan class="orange">&lt;field&gt;</tspan><tspan class="ink">/</tspan></text>

  <!-- folder tree -->
  <g class="m ink" font-size="16">
    <!-- each: tab + body folder glyph, then label -->
    <g>
      <rect x="524" y="226" width="9" height="5" rx="1.5" fill="#AAD6BD"/>
      <rect x="524" y="229" width="22" height="14" rx="2.5" fill="#AAD6BD" stroke="#5E9E7C" stroke-width="1.4"/>
      <text x="558" y="241">01-skills/</text>
    </g>
    <g>
      <rect x="524" y="260" width="9" height="5" rx="1.5" fill="#AAD6BD"/>
      <rect x="524" y="263" width="22" height="14" rx="2.5" fill="#AAD6BD" stroke="#5E9E7C" stroke-width="1.4"/>
      <text x="558" y="275">02-tools/</text>
    </g>
    <g>
      <rect x="524" y="294" width="9" height="5" rx="1.5" fill="#AAD6BD"/>
      <rect x="524" y="297" width="22" height="14" rx="2.5" fill="#AAD6BD" stroke="#5E9E7C" stroke-width="1.4"/>
      <text x="558" y="309">03-workflows/</text>
    </g>
    <g>
      <rect x="524" y="328" width="9" height="5" rx="1.5" fill="#AAD6BD"/>
      <rect x="524" y="331" width="22" height="14" rx="2.5" fill="#AAD6BD" stroke="#5E9E7C" stroke-width="1.4"/>
      <text x="558" y="343">04-prompts/</text>
    </g>
    <g>
      <rect x="524" y="362" width="9" height="5" rx="1.5" fill="#AAD6BD"/>
      <rect x="524" y="365" width="22" height="14" rx="2.5" fill="#AAD6BD" stroke="#5E9E7C" stroke-width="1.4"/>
      <text x="558" y="377">05-schemas/</text>
    </g>
    <g>
      <rect x="524" y="396" width="9" height="5" rx="1.5" fill="#AAD6BD"/>
      <rect x="524" y="399" width="22" height="14" rx="2.5" fill="#AAD6BD" stroke="#5E9E7C" stroke-width="1.4"/>
      <text x="558" y="411">docs/</text>
    </g>
    <g>
      <rect x="524" y="430" width="9" height="5" rx="1.5" fill="#AAD6BD"/>
      <rect x="524" y="433" width="22" height="14" rx="2.5" fill="#AAD6BD" stroke="#5E9E7C" stroke-width="1.4"/>
      <text x="558" y="445">config/</text>
    </g>
  </g>

  <!-- workflow diagram -->
  <rect x="742" y="222" width="396" height="214" rx="16" fill="#F1ECDF" stroke="#DDD6C8" stroke-width="1.6"/>
  <g class="h" font-weight="800" text-anchor="middle">
    <!-- top row -->
    <rect x="760" y="250" width="86" height="40" rx="9" fill="#FFFFFF" stroke="#D7D0C2" stroke-width="1.6"/>
    <text x="803" y="275" class="ink" font-size="13.5">INPUT</text>
    <rect x="894" y="248" width="110" height="44" rx="10" fill="#CDE9D6" stroke="#6FAE86" stroke-width="1.8"/>
    <text x="949" y="274" font-size="13.5" fill="#2E5A41">WORKFLOW</text>
    <rect x="1042" y="250" width="86" height="40" rx="9" fill="#FFFFFF" stroke="#D7D0C2" stroke-width="1.6"/>
    <text x="1085" y="275" class="ink" font-size="13.5">OUTPUT</text>
    <!-- bottom row -->
    <rect x="760" y="362" width="104" height="40" rx="9" fill="#FFFFFF" stroke="#D7D0C2" stroke-width="1.6"/>
    <text x="812" y="387" class="ink" font-size="13">TOOLS</text>
    <rect x="894" y="362" width="110" height="40" rx="9" fill="#FFFFFF" stroke="#D7D0C2" stroke-width="1.6"/>
    <text x="949" y="387" class="ink" font-size="13">PROMPTS</text>
    <rect x="1034" y="362" width="94" height="40" rx="9" fill="#FFFFFF" stroke="#D7D0C2" stroke-width="1.6"/>
    <text x="1081" y="387" class="ink" font-size="13">DATA</text>
  </g>
  <!-- connectors -->
  <g stroke="#9A917F" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M846 270 h32 m-8 -6 l8 6 l-8 6"/>
    <path d="M1004 270 h30 m-8 -6 l8 6 l-8 6"/>
    <path d="M949 292 v28"/>
    <path d="M812 320 h269"/>
    <path d="M812 320 v42"/>
    <path d="M949 320 v42"/>
    <path d="M1081 320 v42"/>
  </g>
  <text x="940" y="424" class="t" font-size="13.5" font-style="italic" fill="#6E665A" text-anchor="middle">Your workspace. Your rules. Your automation.</text>

  <!-- ===================== RIGHT: USE IT YOUR WAY ===================== -->
  <g>
    <text x="500" y="506" class="h ink" font-size="18" font-weight="800">Use it your way:</text>
    <line x1="500" y1="514" x2="640" y2="514" stroke="#C25A2E" stroke-width="2" stroke-linecap="round"/>
  </g>
  <g class="t">
    <!-- CLI -->
    <rect x="500" y="524" width="40" height="34" rx="8" fill="#2A2622"/>
    <text x="510" y="546" class="m" font-size="15" font-weight="700" fill="#F0E9DA">&gt;_</text>
    <text x="550" y="538" class="ink" font-size="16" font-weight="700">CLI</text>
    <text x="550" y="556" class="mut" font-size="12.5">Run locally in your terminal</text>

    <!-- Wizard -->
    <rect x="724" y="524" width="40" height="34" rx="8" fill="#FFFFFF" stroke="#C9C2B4" stroke-width="1.6"/>
    <g stroke="#7A7163" stroke-width="2" stroke-linecap="round"><path d="M732 533 h18"/><path d="M732 541 h18"/><path d="M732 549 h10"/></g>
    <path d="M748 549 l3 3 l6 -7" fill="none" stroke="#4E9A6C" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="774" y="538" class="ink" font-size="16" font-weight="700">Wizard</text>
    <text x="774" y="556" class="mut" font-size="12.5">Step-by-step guided setup</text>

    <!-- Web App -->
    <g transform="translate(948 524)">
      <circle cx="20" cy="17" r="16" fill="#FFFFFF" stroke="#C9C2B4" stroke-width="1.6"/>
      <g stroke="#7A7163" stroke-width="1.4" fill="none">
        <ellipse cx="20" cy="17" rx="7" ry="16"/>
        <path d="M4 17 h32 M6 9 h28 M6 25 h28"/>
      </g>
    </g>
    <text x="988" y="538" class="ink" font-size="16" font-weight="700">Web App</text>
    <text x="988" y="556" class="mut" font-size="12.5">Use from anywhere</text>
  </g>

  <!-- ===================== BOTTOM TIP ===================== -->
  <line x1="56" y1="582" x2="1144" y2="582" stroke="#E4DDCD" stroke-width="2"/>
  <!-- lightbulb -->
  <g transform="translate(58 596)">
    <circle cx="12" cy="11" r="9" fill="#F7E6B0" stroke="#E0B23E" stroke-width="2"/>
    <path d="M8 20 h8 M9 24 h6" stroke="#E0B23E" stroke-width="2" stroke-linecap="round"/>
    <g stroke="#E0B23E" stroke-width="1.6" stroke-linecap="round"><path d="M12 -2 v-4"/><path d="M24 11 h4"/><path d="M-4 11 h4"/><path d="M21 2 l3 -3"/><path d="M3 2 l-3 -3"/></g>
  </g>
  <text x="92" y="603" class="t ink" font-size="15" font-weight="700">Every field is different. Your kit should be too.</text>
  <text x="92" y="623" class="t" font-size="13.5" fill="#7A7163"><tspan class="orange" font-weight="700">[ </tspan>clinic · accounting · real estate · hotel · agency · contractor · and more…<tspan class="orange" font-weight="700"> ]</tspan></text>
</svg>
