name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    name: Contract & template verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      # stdlib-only checks (no install step)
      - name: Verify contract integrity (config <-> python <-> ts, py_compile, scaffold)
        run: python3 scripts/verify.py
      - name: Verify webapp Convex wiring (template)
        run: python3 scripts/check_web.py skills/cowork-automation-generator/assets/templates/web
      - name: Check wizard syntax
        run: node --check wizard/server.mjs
